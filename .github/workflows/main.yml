name: Fabrica-APK-Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Crear Recursos Base
      run: |
        mkdir -p app/src/main/res/values
        echo '<resources><style name="Theme.QuickNotes" parent="android:Theme.Material.Light.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml
        echo '<resources><string name="app_name">QuickNotes</string></resources>' > app/src/main/res/values/strings.xml

    - name: Reparar Entorno
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Compilar APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Entregar Archivo
      uses: actions/upload-artifact@v4
      with:
        name: QuickNotes-APK
        path: app/build/outputs/apk/debug/app-debug.apk
